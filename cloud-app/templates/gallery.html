<!DOCTYPE html>
<html>
<head>
    <title>Галерея фотографа</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }
        .gallery-container { flex: 1; max-width: 1200px; margin: 20px auto; padding: 20px; }
        h2 { color: #333; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item img {
            width: 100%; height: 200px; object-fit: cover; border-radius: 8px;
            cursor: pointer; transition: transform 0.2s;
        }
        .gallery-item img:hover { transform: scale(1.02); }

        /* Lightbox (плеер) */
        .lightbox { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.9); z-index:1000; 
                    justify-content: center; align-items: center; flex-direction: column; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; }
        .lightbox .close { position: absolute; top: 20px; right: 40px; color: white; font-size: 40px; cursor: pointer; }
        .lightbox .nav { color: white; font-size: 60px; cursor: pointer; user-select: none; padding: 0 20px; }
        .lightbox .prev { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); }
        .lightbox .next { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); }
        .lightbox .caption { color: white; text-align: center; margin-top: 15px; font-size: 18px; }

        footer { margin-top: auto; padding: 20px; background: #f8f9fa; text-align: center; color: #666; }
    </style>
</head>
<body>
    <div class="gallery-container">
        <h2>Фотографии</h2>
        <div id="galleryGrid" class="gallery-grid">Загрузка...</div>
    </div>

    <!-- Lightbox плеер -->
    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <span class="nav prev" onclick="changeImage(-1)">&#10094;</span>
        <img id="lightboxImg" src="" alt="">
        <span class="nav next" onclick="changeImage(1)">&#10095;</span>
        <div class="caption" id="lightboxCaption"></div>
    </div>

    <footer>
        <p>📷 Иван Фотографов | +7 (999) 123-45-67 | photo@example.com</p>
        <p>© 2025 Портфолио фотографа</p>
    </footer>

    <script>
        const folder = "{{ folder }}";
        const token = "{{ token }}";
        let images = [];

        async function loadGallery() {
            const res = await fetch(`/list?folder=${encodeURIComponent(folder)}`);
            const files = await res.json();
            images = files.filter(f => f.is_image);
            const grid = document.getElementById('galleryGrid');
            if (images.length === 0) {
                grid.innerHTML = '<p>В этой галерее пока нет изображений.</p>';
                return;
            }
            grid.innerHTML = images.map((img, idx) => {
                // Превью с водяным знаком в лайтбоксе, но миниатюры можно без
                const thumbUrl = `/preview/${encodeURIComponent(folder)}/${encodeURIComponent(img.filename)}`;
                return `
                    <div class="gallery-item">
                        <img src="${thumbUrl}" alt="${img.original_name || img.filename}" 
                             onclick="openLightbox(${idx})">
                    </div>
                `;
            }).join('');
        }

        let currentIdx = 0;
        function openLightbox(idx) {
            currentIdx = idx;
            const img = images[idx];
            // В плеере показываем с водяным знаком
            document.getElementById('lightboxImg').src = 
                `/preview/${encodeURIComponent(folder)}/${encodeURIComponent(img.filename)}?watermark=1`;
            document.getElementById('lightboxCaption').innerText = img.original_name || img.filename;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function changeImage(delta) {
            currentIdx = (currentIdx + delta + images.length) % images.length;
            const img = images[currentIdx];
            document.getElementById('lightboxImg').src = 
                `/preview/${encodeURIComponent(folder)}/${encodeURIComponent(img.filename)}?watermark=1`;
            document.getElementById('lightboxCaption').innerText = img.original_name || img.filename;
        }

        // Управление с клавиатуры
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') changeImage(-1);
            if (e.key === 'ArrowRight') changeImage(1);
        });

        // Закрытие по клику вне изображения
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        loadGallery();
    </script>
</body>
</html>
